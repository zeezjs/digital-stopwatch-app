<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Digital Stopwatch</title>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="clock">
                <span>00</span> 
                <span>00</span> 
                <span>00</span> 
                <span>000</span>
            </div>
            <div class="buttons">
                <button class="bttn start-bttn">Start</button>
                <button class="bttn pause-bttn">Pause</button>
                <button class="bttn stop-bttn">Stop</button>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
